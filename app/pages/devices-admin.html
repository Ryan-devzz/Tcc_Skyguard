<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyGuard — Gerenciar Dispositivos</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="sidebar-root"></div>
  <div class="app-layout">
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title">⚙️ Gerenciar Dispositivos</div>
        <button class="btn btn-primary btn-sm" onclick="abrirModalNovoDevice()">+ Novo Dispositivo</button>
      </div>

      <div class="section">

        <!-- LISTA DE DISPOSITIVOS -->
        <div class="card mb-4">
          <div class="card-title mb-4">📡 Dispositivos Cadastrados</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Nome</th>
                  <th>Local</th>
                  <th>Status</th>
                  <th>Usuários</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="devicesTable">
                <tr><td colspan="6" style="text-align:center;color:var(--text-muted)">Carregando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- MODAL NOVO DISPOSITIVO -->
  <div id="modalDevice" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;">
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:32px;width:100%;max-width:440px;">
      <div style="font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:20px;">➕ Novo Dispositivo</div>
      <div class="form-group">
        <label class="form-label">ID do Dispositivo</label>
        <input id="inp-devid" class="form-input" placeholder="Ex: SGP-004">
      </div>
      <div class="form-group">
        <label class="form-label">Nome</label>
        <input id="inp-devname" class="form-input" placeholder="Ex: Sala de Reuniões">
      </div>
      <div class="form-group">
        <label class="form-label">Localização</label>
        <input id="inp-devloc" class="form-input" placeholder="Ex: 2º Andar — Bloco A">
      </div>
      <div style="display:flex;gap:12px;margin-top:24px;">
        <button class="btn btn-secondary" style="flex:1" onclick="fecharModalDevice()">Cancelar</button>
        <button class="btn btn-primary" style="flex:1" onclick="salvarDevice()">Salvar</button>
      </div>
    </div>
  </div>

  <!-- MODAL ATRIBUIR USUÁRIOS -->
  <div id="modalAssign" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;">
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:32px;width:100%;max-width:500px;">
      <div style="font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:4px;">👥 Atribuir Usuários</div>
      <div id="assign-devname" style="font-size:13px;color:var(--accent);margin-bottom:20px;"></div>

      <div class="form-group">
        <label class="form-label">Adicionar usuário</label>
        <div style="display:flex;gap:8px;">
          <select id="sel-user" class="form-input" style="flex:1"></select>
          <button class="btn btn-primary" onclick="atribuirUsuario()">Adicionar</button>
        </div>
      </div>

      <div style="margin-top:16px;">
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">USUÁRIOS COM ACESSO</div>
        <div id="assigned-list" style="display:flex;flex-direction:column;gap:8px;"></div>
      </div>

      <div style="margin-top:24px;">
        <button class="btn btn-secondary" style="width:100%" onclick="fecharModalAssign()">Fechar</button>
      </div>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const user = getUser();
    if (!user || user.role !== 'admin') window.location.href = 'dashboard.html';
    renderNav('devices-admin');

    let todosUsers = [];
    let deviceAtual = null;

    // ── Carrega dispositivos ──────────────────────────────────
    async function carregarDevices() {
      const res = await fetch('../api/devices.php', { credentials: 'same-origin' });
      const devices = await res.json();
      const tbody = document.getElementById('devicesTable');

      if (!devices.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-muted)">Nenhum dispositivo cadastrado</td></tr>';
        return;
      }

      // Carrega atribuições
      const resA = await fetch('../api/devices.php?assignments=1', { credentials: 'same-origin' });
      const assignments = await resA.json();

      tbody.innerHTML = devices.map(d => {
        const users = assignments.filter(a => a.device_id === d.device_id);
        const userBadges = users.length
          ? users.map(u => `<span style="background:var(--accent-dim);color:var(--accent);padding:2px 8px;border-radius:20px;font-size:11px;">${u.name}</span>`).join(' ')
          : '<span style="color:var(--text-muted);font-size:12px;">Nenhum</span>';

        const statusColor = d.status === 'online' ? 'var(--success)' : 'var(--text-muted)';

        return `<tr>
          <td><span style="font-family:monospace;color:var(--accent)">${d.device_id}</span></td>
          <td>${d.name}</td>
          <td style="color:var(--text-muted)">${d.location || '—'}</td>
          <td><span style="color:${statusColor}">● ${d.status}</span></td>
          <td>${userBadges}</td>
          <td>
            <button class="btn btn-secondary btn-sm" onclick="abrirModalAssign('${d.device_id}','${d.name}')">👥 Usuários</button>
            <button class="btn btn-secondary btn-sm" onclick="deletarDevice('${d.device_id}')" style="color:var(--danger);margin-left:4px;">🗑</button>
          </td>
        </tr>`;
      }).join('');
    }

    // ── Carrega usuários para o select ────────────────────────
    async function carregarUsers() {
      const res = await fetch('../api/users.php', { credentials: 'same-origin' });
      todosUsers = await res.json();
    }

    // ── Modal Novo Device ─────────────────────────────────────
    function abrirModalNovoDevice() {
      document.getElementById('modalDevice').style.display = 'flex';
    }
    function fecharModalDevice() {
      document.getElementById('modalDevice').style.display = 'none';
      document.getElementById('inp-devid').value = '';
      document.getElementById('inp-devname').value = '';
      document.getElementById('inp-devloc').value = '';
    }
    async function salvarDevice() {
      const body = {
        device_id: document.getElementById('inp-devid').value.trim(),
        name:      document.getElementById('inp-devname').value.trim(),
        location:  document.getElementById('inp-devloc').value.trim()
      };
      if (!body.device_id || !body.name) return alert('ID e Nome são obrigatórios');
      const res = await fetch('../api/devices.php', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (data.success) { fecharModalDevice(); carregarDevices(); }
      else alert(data.error || 'Erro ao salvar');
    }

    // ── Modal Atribuir Usuários ───────────────────────────────
    async function abrirModalAssign(deviceId, deviceName) {
      deviceAtual = deviceId;
      document.getElementById('assign-devname').textContent = deviceId + ' — ' + deviceName;
      document.getElementById('modalAssign').style.display = 'flex';
      await carregarAssignments();
    }
    function fecharModalAssign() {
      document.getElementById('modalAssign').style.display = 'none';
      deviceAtual = null;
      carregarDevices();
    }

    async function carregarAssignments() {
      // Usuários já atribuídos
      const res = await fetch(`../api/devices.php?assignments=1&device_id=${deviceAtual}`, { credentials: 'same-origin' });
      const atribuidos = await res.json();
      const atribuidosIds = atribuidos.map(u => u.id);

      // Popula select com usuários não atribuídos
      const sel = document.getElementById('sel-user');
      const disponiveis = todosUsers.filter(u => !atribuidosIds.includes(u.id) && u.role !== 'admin');
      sel.innerHTML = disponiveis.length
        ? disponiveis.map(u => `<option value="${u.id}">${u.name} (${u.email})</option>`).join('')
        : '<option value="">Todos os usuários já têm acesso</option>';

      // Lista atribuídos
      const list = document.getElementById('assigned-list');
      list.innerHTML = atribuidos.length
        ? atribuidos.map(u => `
          <div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg-dark);padding:10px 14px;border-radius:8px;">
            <div>
              <div style="font-size:14px;color:var(--text-primary)">${u.name}</div>
              <div style="font-size:12px;color:var(--text-muted)">${u.email}</div>
            </div>
            <button class="btn btn-secondary btn-sm" style="color:var(--danger)" onclick="removerUsuario(${u.id})">Remover</button>
          </div>`).join('')
        : '<div style="color:var(--text-muted);font-size:13px;">Nenhum usuário com acesso ainda.</div>';
    }

    async function atribuirUsuario() {
      const userId = document.getElementById('sel-user').value;
      if (!userId) return;
      await fetch('../api/devices.php?assign=1', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ device_id: deviceAtual, user_id: parseInt(userId) })
      });
      await carregarAssignments();
    }

    async function removerUsuario(userId) {
      await fetch('../api/devices.php?assign=1', {
        method: 'DELETE', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ device_id: deviceAtual, user_id: userId })
      });
      await carregarAssignments();
    }

    async function deletarDevice(deviceId) {
      if (!confirm(`Remover dispositivo ${deviceId}?`)) return;
      await fetch(`../api/devices.php?id=${deviceId}`, {
        method: 'DELETE', credentials: 'same-origin'
      });
      carregarDevices();
    }

    // ── Init ─────────────────────────────────────────────────
    carregarUsers();
    carregarDevices();
  </script>
</body>
</html>
