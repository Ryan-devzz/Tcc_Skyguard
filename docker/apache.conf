<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Segurança: esconde arquivos sensíveis
        <FilesMatch "\.(env|sql|lock|json|md)$">
            Require all denied
        </FilesMatch>
        # Permite acesso a manifest.json e composer.json (se necessário)
        <Files "manifest.json">
            Require all granted
        </Files>
    </Directory>

    # Headers de segurança
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog  ${APACHE_LOG_DIR}/skyguard_error.log
    CustomLog ${APACHE_LOG_DIR}/skyguard_access.log combined
</VirtualHost>
