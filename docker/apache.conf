<VirtualHost *:80>
    RewriteEngine On
    RewriteRule ^(.*)$ https://tccskyguard.duckdns.org$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName tccskyguard.duckdns.org
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    RedirectMatch ^/$ /login.html

    SSLEngine on
    SSLCertificateFile    /etc/apache2/ssl/skyguard.crt
    SSLCertificateKeyFile /etc/apache2/ssl/skyguard.key

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        <FilesMatch "\.(env|sql|lock|md)$">
            Require all denied
        </FilesMatch>
        <Files "manifest.json">
            Require all granted
        </Files>
    </Directory>

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"

    ErrorLog  ${APACHE_LOG_DIR}/skyguard_error.log
    CustomLog ${APACHE_LOG_DIR}/skyguard_access.log combined
</VirtualHost>
